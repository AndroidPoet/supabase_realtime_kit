# House standard: strict, pub-grade lints for a published library.
include: package:very_good_analysis/analysis_options.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    # The core packages are pure Dart; allow print only in the example app.
    avoid_print: true
    public_member_api_docs: true
